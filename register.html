<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Page-PrimeHaven</title>
    <link rel="icon" href="images/info-favicon.png">

    <link rel="stylesheet" href="CSS/register.css">

</head>

<body>
    

<form action="">
    
    <legend> <marquee behavior="" direction="">Join us and start your journey Today!</marquee></legend>
    <br>

<label for="Fname">Firstname:</label>
<input type="text" placeholder="Enter First name" id="Fname" required>
<br><br>


<label for="Sname">Surname:</label>
<input type="text" placeholder="Enter Surname" id="Sname" required>
<br><br>
<label for="email">E-mail Address</label>
<input type="email" placeholder="abc@gmail.com" id="email" required>
<br><br>
<label for="pswd">Password:</label>
<input type="password" placeholder="Enter Password" id="pswd" required>
<br><br>
<label for="phone">Phone:</label>
<input type="tel" placeholder="Enter Phone Number" id="phone" required>
<br><br>

<label for="yob">Year of Birth:</label>
<input type="date" id="yob" required>
<br><br>
<label for="dt">Date and Time</label>
<input type="datetime-local" id="dt" required>
<br>

<label for="file">Upload file</label>
<input type="file"id="file" placeholder="Browse" required>
<br><br>
<label for="nationality">Select nationality ></label>

<!--Dropdown-->
<select name="" id="nationality">
    
<option value="" >Kenyan</option>
<option value="" >Rwandan</option>
<option value="" >Uganda</option>
<option value="">Burundi></option>


</select>
</select>


<!--End of Dropdown-->




<br><br>


<form>
    <!-- Gender Selection -->
    <label>Select Gender:</label><br>
    <input type="radio" id="male" name="gender" value="male">
    <label for="male">Male</label><br>

    <input type="radio" id="female" name="gender" value="female">
    <label for="female">Female</label><br><br>

    <!-- Programming Languages -->
    <label>Choose web programming language(s):</label><br>
    <input type="checkbox" id="php" name="language" value="php">
    <label for="php">PHP</label><br>

    <input type="checkbox" id="python" name="language" value="python">
    <label for="python">Python</label><br><br>

    <!-- Message -->
    <label for="message">Message:</label><br>
    <textarea id="message" name="message" placeholder="Type your message here" maxlength="400" ></textarea><br><br>

 <style>
    /* Style the textarea */
    #message {
        width: 400px;       /* replaces cols="40" */
        height: 120px;      /* replaces rows="4" */
        padding: 10px;      /* adds inner spacing */
        font-family: Arial, sans-serif;
        font-size: 14px;
        border: 1px solid #ccc;
        border-radius: 5px;
        resize: none;  /* doesn't allow users to resize */
    }

    /* Style the placeholder text */
    #message::placeholder {
        color: #44c906;
        font-style: italic;
    }
</style>
</form>




 












</form>

</body>
</html>
