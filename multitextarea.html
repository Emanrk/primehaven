<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
     <h2>Feedback Form</h2>
    <form>
        <!-- General Feedback -->
        <label for="general">General Feedback:</label><br>
        <textarea id="general" name="general" rows="4" cols="50"></textarea><br><br>

        <!-- Suggestions -->
        <label for="suggestions">Suggestions for Improvement:</label><br>
        <textarea id="suggestions" name="suggestions" rows="4" cols="50"></textarea><br><br>

        <!-- Additional Comments -->
        <label for="comments">Additional Comments:</label><br>
        <textarea id="comments" name="comments" rows="4" cols="50"></textarea><br><br>

        <!-- Submit -->
        <input type="submit" value="Submit">

        <style>
            #comments {
            resize:none;


            }

        </style>
    </form>
</body>
</html>
